<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Pedidos Matriz</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="img/icone.ico" type="image/x-icon">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
    <img src="img/logo.png" alt="imagem" class="img-logo">
    <div class="login-container">
        <div style="width: 100%; max-width: 400px;">
            <h1 style="margin-bottom: 24px;">Login Matriz</h1>
            <form action="index.html">
                <div style="margin-bottom: 20px;">
                    <label>E-mail</label>
                    <input type="email" class="form-control" placeholder="nome@empresa.com" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label>Senha</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="b-login">Acessar Sistema</button>
            </form>
        </div>
    </div>
    <div class="login-visual">
        <h2>Pedidos Matriz</h2>
        <p>Conectando filiais com eficiência.</p>
    </div>
    <script src="script/script.js"></script>
</body>
</html>
