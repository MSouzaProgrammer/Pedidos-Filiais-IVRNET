<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login | Pedidos Matriz</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="img/icone.ico" type="image/x-icon">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-body">
    <img src="img/logo.png" alt="imagem" class="img-logo">
    <div class="login-container">
        <div style="width: 100%; max-width: 400px;">
            <h1 style="margin-bottom: 24px;">Login Matriz</h1>
            <form>
                <div style="margin-bottom: 20px;">
                    <label>E-mail</label>
                    <input type="email" class="form-control" placeholder="nome@empresa.com" id="email-login" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label>Senha</label>
                    <input type="password" class="form-control" placeholder="••••••••" id="senhaLogin" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="b-login">Acessar Sistema</button>
            </form>
        </div>
    </div>
    <div id="loading-global" class="loading-overlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <span>Entrando...</span>
        </div>
    </div>
    <script type="module" src="script/login.js"></script>
</body>

</html>
